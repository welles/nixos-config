name: navidrome

services:
  navidrome:
    container_name: navidrome
    environment:
      ND_BASEURL: https://navidrome.welles.app
      ND_SCANNER_PURGEMISSING: always
      ND_SCANNER_SCHEDULE: "0 5 * * *"
      TZ: Europe/Berlin
    env_file:
      - /run/secrets/navidrome
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --proxy off localhost:4533/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    image: deluan/navidrome:0.60.3
    networks:
      navidrome:
        ipv4_address: 10.10.3.10
    ports:
      - 50030:4533/tcp
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/bucket/apps/navidrome:/data
      - /mnt/tank/music:/music

networks:
  navidrome:
    name: navidrome
    driver: bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 10.10.3.0/24
