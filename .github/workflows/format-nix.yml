name: Format Nix Files

concurrency:
  group: nix-format
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["Update Flake Inputs"]
    types:
      - completed
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Format nix files with alejandra
        run: |
          find . -name "*.nix" \
            -not -name "hardware-configuration.nix" \
            -not -path "./.git/*" \
            -print0 \
          | xargs -0 nix run nixpkgs#alejandra --

      - name: Format shell files with shfmt
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -print0 \
          | xargs -0 nix run nixpkgs#shfmt -- -w

      - name: Commit and push changes
        uses: planetscale/ghcommit-action@v0.2.20
        with:
          commit_message: "Format nix and shell files"
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          file_pattern: "**/*.nix **/*.sh"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
