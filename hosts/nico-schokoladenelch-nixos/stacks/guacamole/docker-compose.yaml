name: guacamole

services:
  guacamole_initdb:
    container_name: guacamole_initdb
    image: guacamole/guacamole:1.6.0
    user: root
    command: ["/bin/sh", "-c", "/opt/guacamole/bin/initdb.sh --postgresql > /initdb/initdb.sql"]
    environment:
      TZ: Europe/Berlin
    network_mode: none
    restart: "no"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - guacamole_initdb:/initdb:rw

  guacamole_db:
    container_name: guacamole_db
    depends_on:
      guacamole_initdb:
        condition: service_completed_successfully
    image: postgres:17.9
    env_file:
      - /run/secrets/guacamole_db
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole
      TZ: Europe/Berlin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole -d guacamole_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      guacamole:
        ipv4_address: 10.10.11.10
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/bucket/apps/guacamole/db:/var/lib/postgresql/data:rw
      - guacamole_initdb:/docker-entrypoint-initdb.d:ro

  guacamole_daemon:
    container_name: guacamole_daemon
    environment:
      TZ: Europe/Berlin
    image: guacamole/guacd:1.6.0
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      guacamole:
        ipv4_address: 10.10.11.20
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - /etc/localtime:/etc/localtime:ro

  guacamole_app:
    container_name: guacamole_app
    depends_on:
      guacamole_db:
        condition: service_healthy
      guacamole_daemon:
        condition: service_healthy
    env_file:
      - /run/secrets/guacamole_app
    environment:
      GUACD_HOSTNAME: guacamole_daemon
      POSTGRESQL_HOSTNAME: guacamole_db
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: guacamole
      WEBAPP_CONTEXT: ROOT
      TZ: Europe/Berlin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    image: guacamole/guacamole:1.6.0
    networks:
      guacamole:
        ipv4_address: 10.10.11.30
    ports:
      - 50110:8080/tcp
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - /etc/localtime:/etc/localtime:ro

volumes:
  guacamole_initdb:

networks:
  guacamole:
    name: guacamole
    driver: bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 10.10.11.0/24
