name: windows

services:
  windows:
    cap_add:
      - NET_ADMIN
    container_name: windows
    devices:
      - /dev/dri
      - /dev/kvm
      - /dev/net/tun
    environment:
      VERSION: 2025
      DISK_SIZE: 128G
      DISK2_SIZE: 1024G
      RAM_SIZE: 16G
      CPU_CORES: 8
      DISPLAY: none
      LANGUAGE: English
      REGION: de-DE
      KEYBOARD: de-DE
      TZ: Europe/Berlin
    env_file:
      - /run/secrets/windows
    image: dockurr/windows:5.14
    networks:
      windows:
        ipv4_address: 10.10.5.10
    ports:
      - 50051:3389/tcp
      - 50051:3389/udp
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/bucket/apps/windows/storage:/storage:rw
      - /mnt/tank/windows/storage2:/storage2:rw
      - /mnt/tank:/shared:rw

networks:
  windows:
    name: windows
    driver: bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 10.10.5.0/24
